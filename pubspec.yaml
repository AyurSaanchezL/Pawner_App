name: pawner_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  firebase_core: ^4.6.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  flutter:
    sdk: flutter
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.3.0
  lucide_icons: ^0.257.0
  share_plus: ^13.1.0
  flutter_svg: ^2.2.4
  cupertino_icons: ^1.0.8
  cloudinary_url_gen: ^1.8.0
  cloudinary_flutter: ^1.3.0
  flutter_dotenv: ^6.0.1
  http: ^1.1.0
  image_picker: ^1.0.4
  table_calendar: ^3.0.9
  intl: ^0.18.1
  url_launcher: ^6.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  time_zone_plus: ^0.0.4
  app_settings: ^5.1.1
  numberpicker: ^2.1.2
  firebase_messaging: ^16.2.0
  googleapis_auth: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.0+1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/fotos_perfil/
    - assets/fonts/
    - assets/firebase_credentials.json
    - .env
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic