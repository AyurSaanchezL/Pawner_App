name: pawner_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  firebase_core: ^4.6.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  flutter:
    sdk: flutter
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
   - assets/images/
   - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
      - asset: assets/fonts/Nunito-ExtraLight.ttf
        weight: 200
      - asset: assets/fonts/Nunito-Light.ttf
        weight: 300
      - asset: assets/fonts/Nunito-Regular.ttf
        weight: 400
      - asset: assets/fonts/Nunito-Medium.ttf
        weight: 500
      - asset: assets/fonts/Nunito-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Nunito-Bold.ttf
        weight: 700
      - asset: assets/fonts/Nunito-Black.ttf
        weight: 900
      - asset: assets/fonts/Nunito-Italic.ttf
        style: italic
